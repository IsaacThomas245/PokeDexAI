<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Teal ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#1CC7C7" stroke-width="18" />

  <!-- Pokedex body -->
  <rect
    x="176"
    y="161"
    width="160"
    height="190"
    rx="18"
    ry="18"
    fill="#E53935"
  />

  <!-- Pokedex top circle (camera/light) -->
  <circle cx="204" cy="183" r="10" fill="#000000" />
  <circle cx="204" cy="183" r="6" fill="#8FD9FF" />

  <!-- Pokedex screen -->
  <rect
    x="194"
    y="201"
    width="124"
    height="90"
    rx="8"
    ry="8"
    fill="#111318"
  />

  <!-- Circuit-like lines on screen -->
  <path
    d="M206 221 H286
       M216 241 H276
       M226 261 H266"
    stroke="#1CC7C7"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Bottom buttons -->
  <circle cx="216" cy="311" r="8" fill="#1CC7C7" />
  <circle cx="246" cy="311" r="8" fill="#1CC7C7" />
  <rect x="271" y="303" width="35" height="16" rx="4" ry="4" fill="#1CC7C7" />
</svg>
