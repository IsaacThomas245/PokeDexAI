<svg
  width="512"
  height="512"
  viewBox="0 60 512 300"


  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Teal ring -->
  <circle cx="256" cy="210" r="170" fill="none" stroke="#1CC7C7" stroke-width="18" />

  <!-- Pokedex body -->
  <rect
    x="150"
    y="110"
    width="160"
    height="190"
    rx="18"
    ry="18"
    fill="#E53935"
  />

  <!-- Pokedex top circle (camera/light) -->
  <circle cx="178" cy="132" r="10" fill="#000000" />
  <circle cx="178" cy="132" r="6" fill="#8FD9FF" />

  <!-- Pokedex side notch -->
  <rect x="310" y="150" width="18" height="80" rx="6" ry="6" fill="#E53935" />

  <!-- Pokedex screen -->
  <rect
    x="168"
    y="150"
    width="124"
    height="90"
    rx="8"
    ry="8"
    fill="#111318"
  />

  <!-- Circuit-like lines on screen -->
  <path
    d="M180 170 H260
       M190 190 H250
       M200 210 H240"
    stroke="#1CC7C7"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Bottom buttons -->
  <circle cx="190" cy="260" r="8" fill="#1CC7C7" />
  <circle cx="220" cy="260" r="8" fill="#1CC7C7" />
  <rect x="245" y="252" width="35" height="16" rx="4" ry="4" fill="#1CC7C7" />

  <!-- Speech bubble -->
  <path
    d="M290 125
       h 90
       a 18 18 0 0 1 18 18
       v 60
       a 18 18 0 0 1 -18 18
       h -45
       l -18 20
       v -20
       h -27
       a 18 18 0 0 1 -18 -18
       v -60
       a 18 18 0 0 1 18 -18
       z"
    fill="#111318"
    stroke="#1CC7C7"
    stroke-width="4"
  />
</svg>
